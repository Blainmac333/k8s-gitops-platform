apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 2  # Number of pod replicas
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: blainmac333/qr-code-frontend:latest  # Use your Docker Hub image
          ports:
            - containerPort: 3000  # Adjust if needed
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: NEXT_PUBLIC_BACKEND_URL
              value: "http://backend-service"  # Replace with your Kubernetes backend service name
