apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: api-strip
  namespace: qr
spec:
  stripPrefix:
    prefixes:
      - /api
---
# Ingress JUST for /api, with the middleware attached
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qr-api
  namespace: qr
  labels:
    app: qr
  annotations:
    # Attach the middleware defined above (namespace/name@kubernetescrd)
    traefik.ingress.kubernetes.io/router.middlewares: qr-api-strip@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: qr.blainweb.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: qr-backend
                port:
                  number: 8000
---
# Ingress for everything else (no strip)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qr-main
  namespace: qr
  labels:
    app: qr
spec:
  ingressClassName: traefik
  rules:
    - host: qr.blainweb.com
      http:
        paths:
          - path: /qrs
            pathType: Prefix
            backend:
              service:
                name: qr-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qr-frontend
                port:
                  number: 3000