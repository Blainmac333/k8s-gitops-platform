# Ingress JUST for /api, with the middleware attached
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qr-api
  namespace: qr
  labels:
    app: qr
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: qr-qr-api-strip@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: qr.blainweb.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: qr-backend
                port:
                  number: 8000   # (use 80 here if your Service exposes 80)
---
# Ingress for everything else (no strip)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qr-main
  namespace: qr
  labels:
    app: qr
spec:
  ingressClassName: traefik
  rules:
    - host: qr.blainweb.com
      http:
        paths:
          - path: /qrs
            pathType: Prefix
            backend:
              service:
                name: qr-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qr-frontend
                port:
                  number: 3000