# Ingress JUST for /api, with the middleware attached
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qr-api
  namespace: qr
  labels:
    app: qr
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: qr-qr-api-strip@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - qr.blainweb.com
      secretName: qr-blainweb-tls
  rules:
    - host: qr.blainweb.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: qr-backend
                port:
                  number: 8000
---
# Ingress for everything else (no strip)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qr-main
  namespace: qr
  labels:
    app: qr
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - qr.blainweb.com
      secretName: qr-blainweb-tls
  rules:
    - host: qr.blainweb.com
      http:
        paths:
          - path: /qrs
            pathType: Prefix
            backend:
              service:
                name: qr-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qr-frontend
                port:
                  number: 3000