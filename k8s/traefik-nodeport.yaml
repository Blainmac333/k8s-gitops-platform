apiVersion: v1
kind: Service
metadata:
  name: traefik-nodeport
  namespace: kube-system
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: traefik
  ports:
    - name: web
      port: 80
      targetPort: 8000     # <- was 80
      nodePort: 30080
    - name: websecure
      port: 443
      targetPort: 8443     # <- was 443
      nodePort: 30443