apiVersion: apps/v1
kind: Deployment
metadata:
  name: qr-backend
  namespace: qr
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: qr-backend
  template:
    metadata:
      labels:
        app: qr-backend
    spec:
      containers:
        - name: qr-backend
          image: ghcr.io/blainmac333/qr-backend:c99a403a8156be131ddfc86e0a15c84f0d805cc8
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: FRONTEND_URL
              value: "https://qr.blainweb.com"
            - name: QR_CODE_URL
              value: "https://qr.blainweb.com"
            - name: LOCAL_STORAGE_DIR
              value: /data/qrs
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "600m"
              memory: "384Mi"
          volumeMounts:
            - name: qrs
              mountPath: /data/qrs
      volumes:
        - name: qrs
          persistentVolumeClaim:
            claimName: qrs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: qr-backend
  namespace: qr
spec:
  selector:
    app: qr-backend
  ports:
    - port: 8000
      targetPort: 8000