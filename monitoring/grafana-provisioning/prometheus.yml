global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # Pi host metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Docker/container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
