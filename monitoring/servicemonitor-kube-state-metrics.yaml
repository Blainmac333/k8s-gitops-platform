apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-state-metrics
  namespace: monitoring                   
  labels:
    release: prometheus                   
spec:
  namespaceSelector:
    matchNames:
      - kube-system                       
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  endpoints:
    - port: http-metrics                  
      interval: 30s