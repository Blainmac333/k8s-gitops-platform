global:
  scrape_interval: 15s
  evaluation_interval: 15s

remote_write:
  - url: https://prometheus-prod-55-prod-gb-south-1.grafana.net/api/prom/push
    basic_auth:
      username: "3317368"
      password_file: /etc/prometheus/secrets/grafana-cloud-password
    write_relabel_configs:
      - source_labels: [__name__]
        regex: "container_tasks_state|container_memory_failures_total|container_fs_reads_total|container_fs_writes_total|container_blkio_device_usage_total|container_cpu_load_average_10s|container_cpu_system_seconds_total|container_cpu_user_seconds_total|container_last_seen"
        action: drop

scrape_configs:
  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # Pi host metrics
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # Docker/container metrics
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Kube-State-Metrics
  - job_name: 'kube-state-metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:30090']

  # cAdvisor on Kubernetes Nodes
  - job_name: 'cadvisor-k8s'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:31090']
        labels:
          node: 'raspberrypi'
    metric_relabel_configs:
      - source_labels: [container_label_io_kubernetes_container_name]
        target_label: container
      - source_labels: [container_label_io_kubernetes_pod_name]
        target_label: pod
      - source_labels: [container_label_io_kubernetes_pod_namespace]
        target_label: namespace

  # Velero Metrics
  - job_name: 'velero'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:31085']