# monitoring/cadvisor-daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: kube-system
  labels:
    app: cadvisor
spec:
  selector:
    matchLabels:
      app: cadvisor
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: cadvisor
        kubernetes.io/os: linux
    spec:
      tolerations:
        - operator: "Exists"     # run even if node is tainted (single-node k3s)
      hostNetwork: true
      hostPID: true
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.49.1
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          args:
            - --port=8080
            - --housekeeping_interval=10s
            - --enable_load_reader=true
            - --store_container_labels=false
            # NOTE: no --enable_metrics=... (kept defaults to avoid unsupported values)
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - { name: rootfs,         mountPath: /rootfs,           readOnly: true }
            - { name: var-run,        mountPath: /var/run }
            - { name: sys,            mountPath: /sys,              readOnly: true }
            - { name: cgroup,         mountPath: /sys/fs/cgroup,    readOnly: true }
            - { name: containerd-lib, mountPath: /var/lib/containerd, readOnly: true }
            - { name: containerd-run, mountPath: /run/containerd,   readOnly: true }
      volumes:
        - { name: rootfs,         hostPath: { path: / } }
        - { name: var-run,        hostPath: { path: /var/run } }
        - { name: sys,            hostPath: { path: /sys } }
        - { name: cgroup,         hostPath: { path: /sys/fs/cgroup } }
        - { name: containerd-lib, hostPath: { path: /var/lib/containerd } }
        - { name: containerd-run, hostPath: { path: /run/containerd } }
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: kube-system
  labels:
    app: cadvisor
spec:
  type: NodePort
  selector:
    app: cadvisor
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 31090