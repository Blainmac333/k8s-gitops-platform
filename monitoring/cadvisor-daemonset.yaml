# monitoring/cadvisor-daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: kube-system
  labels:
    app: cadvisor
spec:
  selector:
    matchLabels:
      app: cadvisor
  template:
    metadata:
      labels:
        app: cadvisor
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.47.2
          securityContext:
            privileged: true
          ports:
            - name: http
              containerPort: 8080
          args:
            - --enable_metrics=cpu,cpuset,disk,diskIO,filesystem,memory,network,process
            - --housekeeping_interval=10s
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: var-run
              mountPath: /var/run
              readOnly: false
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: containerd
              mountPath: /var/lib/containerd
              readOnly: true
            - name: kubelet
              mountPath: /var/lib/kubelet
              readOnly: true
      volumes:
        - name: rootfs
          hostPath: { path: /, type: Directory }
        - name: var-run
          hostPath: { path: /var/run, type: Directory }
        - name: sys
          hostPath: { path: /sys, type: Directory }
        - name: cgroup
          hostPath: { path: /sys/fs/cgroup, type: Directory }
        - name: containerd
          hostPath: { path: /var/lib/containerd, type: Directory }
        - name: kubelet
          hostPath: { path: /var/lib/kubelet, type: Directory }
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: kube-system
  labels:
    app: cadvisor
spec:
  type: NodePort
  selector:
    app: cadvisor
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 31090