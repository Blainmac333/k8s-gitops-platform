apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: cadvisor
  template:
    metadata:
      labels:
        app: cadvisor
    spec:
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.49.1
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
            runAsUser: 0
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "200Mi"
          args:
            - --housekeeping_interval=10s
            # IMPORTANT: k3s containerd socket:
            - --containerd=/run/k3s/containerd/containerd.sock
            - --containerd-namespace=k8s.io
          volumeMounts:
            - { name: rootfs,    mountPath: /rootfs,            readOnly: true }
            - { name: var-run,   mountPath: /var/run }                # keep general /var/run
            - { name: k3s-contd, mountPath: /run/k3s/containerd, readOnly: true }
            - { name: sys,       mountPath: /sys,               readOnly: true }
            - { name: cgroup,    mountPath: /sys/fs/cgroup,     readOnly: true }
            - { name: contd-lib, mountPath: /var/lib/containerd,readOnly: true }
            - { name: kubelet,   mountPath: /var/lib/kubelet,   readOnly: true }
      volumes:
        - { name: rootfs,    hostPath: { path: "/" } }
        - { name: var-run,   hostPath: { path: "/var/run" } }
        - { name: k3s-contd, hostPath: { path: "/run/k3s/containerd" } }   # <— new
        - { name: sys,       hostPath: { path: "/sys" } }
        - { name: cgroup,    hostPath: { path: "/sys/fs/cgroup" } }
        - { name: contd-lib, hostPath: { path: "/var/lib/containerd" } }
        - { name: kubelet,   hostPath: { path: "/var/lib/kubelet" } }
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: kube-system
spec:
  selector:
    app: cadvisor
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 31090