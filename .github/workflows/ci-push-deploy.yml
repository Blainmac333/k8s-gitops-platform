name: Docker Build and Kubernetes Deployment

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push API image
      - name: Build and push API Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/qr-code-api:latest

      # Build and push Frontend image
      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./front-end-nextjs
          file: ./front-end-nextjs/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/qr-code-frontend:latest

      # Update Kubernetes Deployments
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/backend-deployment backend=${{ secrets.DOCKER_USERNAME }}/qr-code-api:latest --record
          kubectl set image deployment/frontend-deployment frontend=${{ secrets.DOCKER_USERNAME }}/qr-code-frontend:latest --record
          kubectl rollout status deployment/backend-deployment
          kubectl rollout status deployment/frontend-deployment
