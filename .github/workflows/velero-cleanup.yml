# .github/workflows/velero-cleanup.yml
name: Velero cleanup (test backups)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "10 3 * * 0"  # Sundays 03:10 UTC

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 20
    steps:
      - name: Sync repo on Pi
        run: |
          cd ~/apps/devops-qr
          git fetch --all
          git reset --hard origin/master

      - name: Verify script exists
        run: |
          cd ~/apps/devops-qr
          echo "Listing repo root and scripts dir:"
          pwd; ls -la; echo; ls -la scripts || true
          test -f scripts/velero-cleanup.sh || { echo "scripts/velero-cleanup.sh is missing"; exit 1; }

      - name: Run cleanup
        run: |
          cd ~/apps/devops-qr
          chmod +x scripts/velero-cleanup.sh
          ./scripts/velero-cleanup.sh --keep 5