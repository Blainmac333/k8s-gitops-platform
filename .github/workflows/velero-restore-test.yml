name: Velero restore test

on:
  workflow_dispatch: {}
  schedule:
    # Mondays 02:30 UTC
    - cron: "30 2 * * 1"

permissions:
  contents: read

jobs:
  test:
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 30
    env:
      KUBECONFIG: /home/blain/.kube/config
    steps:
      - name: Sync repo on Pi
        run: |
          cd ~/apps/devops-qr
          git fetch --all
          git reset --hard origin/master

      - name: Ensure kubeconfig for runner
        run: |
          set -euo pipefail
          mkdir -p /home/blain/.kube
          # copy from k3s root kubeconfig; adjust path if your k3s differs
          sudo cp /etc/rancher/k3s/k3s.yaml /home/blain/.kube/config
          sudo chown blain:blain /home/blain/.kube/config
          chmod 600 /home/blain/.kube/config
          # quick sanity
          kubectl version --short
          kubectl get nodes -o wide

      - name: Run restore test
        run: |
          cd ~/apps/devops-qr
          chmod +x scripts/velero-restore-test.sh
          ./scripts/velero-restore-test.sh

      # Optional: self-clean a bit after each run (keeps last 5)
      - name: Prune old test backups (keep 5)
        if: always()
        run: |
          cd ~/apps/devops-qr
          chmod +x scripts/velero-cleanup.sh
          ./scripts/velero-cleanup.sh --keep 5