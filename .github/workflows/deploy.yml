name: Build, Push, and Deploy to Pi

on:
  push:
    branches: [ master ]   # keep master if that’s your default

concurrency:
  group: deploy-pi
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Lowercase owner for GHCR tag paths
      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/qr-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/qr-backend:${{ github.sha }}

      - name: Build & push frontend (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: ./front-end-nextjs
          file: ./front-end-nextjs/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/qr-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/qr-frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Pi and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_SSH_HOST }}
          username: ${{ secrets.PI_SSH_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/apps/devops-qr

            # If your GHCR packages are private, log in first
            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            # Pull and restart (supports both compose variants)
            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose pull
              docker-compose up -d
            else
              docker compose pull
              docker compose up -d
            fi

            docker image prune -f