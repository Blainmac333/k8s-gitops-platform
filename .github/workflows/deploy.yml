name: Build, Push, and Deploy to Pi

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-pi
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/qr-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/qr-backend:${{ github.sha }}

      - name: Build & push frontend (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: ./front-end-nextjs
          file: ./front-end-nextjs/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE=/api
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/qr-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/qr-frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, Linux, ARM64]
    permissions:
      contents: write  
      packages: write
    env:
      # Make kubectl use the user copy by default
      KUBECONFIG: /home/blain/.kube/config
    steps:
      - uses: actions/checkout@v4
      - name: Ensure kubeconfig for runner
        run: |
          set -euo pipefail
          mkdir -p /home/blain/.kube
          # copy the root-owned k3s kubeconfig to the runner user's home
          sudo cp /etc/rancher/k3s/k3s.yaml /home/blain/.kube/config
          sudo chown blain:blain /home/blain/.kube/config
          chmod 600 /home/blain/.kube/config

          # Compatibility-friendly sanity checks (don’t fail deploy if they hiccup)
          kubectl version --client=true || true
          kubectl cluster-info || true
          kubectl get nodes -o wide || true

      - name: Ensure GHCR pull secret exists
        shell: bash
        env:
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GHCR_READ_TOKEN:-}" ]; then
            echo "GHCR_READ_TOKEN not set; skipping pull-secret setup."
            exit 0
          fi

          kubectl get ns qr >/dev/null 2>&1 || kubectl create ns qr

          kubectl -n qr create secret docker-registry ghcr-creds \
            --docker-server=ghcr.io \
            --docker-username="${GHCR_USER}" \
            --docker-password="${GHCR_READ_TOKEN}" \
            --docker-email=none@example.com \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n qr patch serviceaccount default \
            --type merge \
            -p '{"imagePullSecrets":[{"name":"ghcr-creds"}]}' >/dev/null || true

          echo "✅ Ensured ghcr-creds in namespace 'qr'"
      
      - name: Update k8s image tags to this commit and push (GitOps)
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"

          B=./k8s/qr-backend.yaml
          F=./k8s/qr-frontend.yaml

          sed -i -E "s@(ghcr\.io/.*/qr-backend:)([A-Za-z0-9._-]+|latest)@\1${SHA}@g" "$B"
          sed -i -E "s@(ghcr\.io/.*/qr-frontend:)([A-Za-z0-9._-]+|latest)@\1${SHA}@g" "$F"

          git config --global user.email "ci@users.noreply.github.com"
          git config --global user.name  "ci-bot"

          git add "$B" "$F"

          if git diff --cached --quiet; then
            echo "No image tag changes to commit."
            exit 0
          fi

          git commit -m "GitOps: pin images to ${SHA}"

          # Push using explicit auth so it works on self-hosted, but handle non-fast-forward safely.
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          for attempt in 1 2 3 4 5; do
            echo "Push attempt ${attempt}..."

            # Ensure we're based on latest master before pushing (avoids non-fast-forward)
            git fetch "$REMOTE" master

            # Rebase our new commit on top of latest master
            git rebase FETCH_HEAD

            # Try push
            if git push "$REMOTE" HEAD:master; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed (likely race). Retrying in 3s..."
            sleep 3
          done

          echo "Push failed after 5 attempts."
          exit 1


      - name: Sync repo files on Pi
        run: |
          set -e
          cd ~/apps/devops-qr
          if [ -d .git ]; then
            git config --global --add safe.directory "$(pwd)" || true
            git fetch --all
            git reset --hard origin/master
          else
            echo "WARNING: ~/apps/devops-qr is not a git repo. Skipping sync."
          fi

            # --- Argo CD: install via HelmChart and expose via Traefik ---
      - name: Apply Argo CD namespace + HelmChart
        run: |
          set -e
          cd ~/apps/devops-qr
          kubectl apply -f infra/argocd/namespace.yaml
          kubectl apply -f infra/argocd/helmchart.yaml

      - name: Wait for Argo CD core to be Ready
        shell: bash
        run: |
          set -euo pipefail

          NS=argocd

          echo "⏳ Waiting for Argo CD deployments to appear…"
          # Wait up to ~5 minutes for the Helm controller to create resources
          for i in {1..60}; do
            CNT=$(kubectl -n "$NS" get deploy \
              -l app.kubernetes.io/part-of=argocd \
              --no-headers 2>/dev/null | wc -l | xargs)
            if [[ "$CNT" -ge 2 ]]; then
              echo "Found $CNT Argo CD deployments."
              break
            fi
            sleep 5
          done

          if [[ "${CNT:-0}" -lt 2 ]]; then
            echo "❌ Argo CD deployments did not appear in time."
            kubectl -n "$NS" get all || true
            kubectl -n kube-system get pods -l app=helm,name=argo-cd -A || true
            exit 1
          fi

          echo "⏳ Waiting for server & repo-server rollouts…"
          kubectl -n "$NS" rollout status deploy -l app.kubernetes.io/name=argocd-server --timeout=600s || {
            echo "❌ argocd-server rollout timed out. Pod state:"
            kubectl -n "$NS" get pods -l app.kubernetes.io/name=argocd-server -o wide || true
            kubectl -n "$NS" describe pods -l app.kubernetes.io/name=argocd-server || true
            exit 1
          }
          kubectl -n "$NS" rollout status deploy -l app.kubernetes.io/name=argocd-repo-server --timeout=600s || {
            echo "❌ argocd-repo-server rollout timed out. Pod state:"
            kubectl -n "$NS" get pods -l app.kubernetes.io/name=argocd-repo-server -o wide || true
            kubectl -n "$NS" describe pods -l app.kubernetes.io/name=argocd-repo-server || true
            exit 1
          }

          echo "⏳ Waiting for application-controller (StatefulSet)…"
          kubectl -n "$NS" rollout status statefulset -l app.kubernetes.io/name=argocd-application-controller --timeout=600s || {
            echo "❌ argocd-application-controller rollout timed out. Pod state:"
            kubectl -n "$NS" get pods -l app.kubernetes.io/name=argocd-application-controller -o wide || true
            kubectl -n "$NS" describe pods -l app.kubernetes.io/name=argocd-application-controller || true
            exit 1
          }

          echo "✅ Argo CD core is Ready."


      - name: Expose Argo CD via Ingress (already part of Helm values)
        run: |
          set -e
          kubectl -n argocd get ingress

      - name: Create/Update Argo CD Application for qr
        run: |
          set -e
          cd ~/apps/devops-qr
          kubectl apply -f infra/argocd/app-qr.yaml

      - name: Wait for qr-app to sync & become Healthy
        run: |
          set -e

          # Phase 1: wait for ArgoCD to sync (up to 5 min).
          # Sync=Synced means ArgoCD has applied the new image tag to the Deployments.
          # Health can lag significantly on a Pi, so we don't block on it here.
          echo "Waiting for ArgoCD sync..."
          SYNC=""
          for i in $(seq 1 60); do
            SYNC=$(kubectl -n argocd get application qr-app -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "")
            HEALTH=$(kubectl -n argocd get application qr-app -o jsonpath='{.status.health.status}' 2>/dev/null || echo "")
            echo "qr-app -> sync=${SYNC:-?} health=${HEALTH:-?}"
            [ "$SYNC" = "Synced" ] && break
            sleep 5
          done

          if [ "${SYNC:-}" != "Synced" ]; then
            echo "ArgoCD did not reach Synced in time"
            kubectl -n argocd get application qr-app -o yaml | sed -n '1,200p' || true
            exit 1
          fi

          echo "ArgoCD synced. Waiting for deployment rollouts..."

          # Phase 2: wait for the actual Deployment rollouts (up to 10 min each).
          # kubectl rollout status is authoritative — it watches the Deployment directly
          # and passes as soon as the new pods are available, without ArgoCD lag.
          kubectl -n qr rollout status deploy/qr-backend --timeout=600s || {
            echo "=== qr-backend rollout failed ==="
            kubectl -n qr get pods -o wide || true
            kubectl -n qr describe pods -l app=qr-backend || true
            kubectl -n qr logs deploy/qr-backend --tail=80 --all-containers || true
            exit 1
          }
          kubectl -n qr rollout status deploy/qr-frontend --timeout=600s || {
            echo "=== qr-frontend rollout failed ==="
            kubectl -n qr get pods -o wide || true
            kubectl -n qr describe pods -l app=qr-frontend || true
            kubectl -n qr logs deploy/qr-frontend --tail=40 --all-containers || true
            exit 1
          }

          echo "Both deployments rolled out successfully."

      # --- keep provisioning dirs clean on every deploy ---
      - name: Remove untracked provisioning files
        run: |
          set -e
          cd ~/apps/devops-qr
          git clean -fd monitoring/grafana-provisioning/datasources
          git clean -fd monitoring/grafana-provisioning/dashboards

      - name: Guard Grafana datasource provisioning
        run: |
          set -e
          cd ~/apps/devops-qr/monitoring/grafana-provisioning/datasources
          echo "Files:"; ls -1
          CNT_FILES=$(ls -1 *.y*ml 2>/dev/null | wc -l | xargs)
          [ "$CNT_FILES" -eq 1 ] || { echo "Expected exactly one datasource YAML, found $CNT_FILES"; exit 1; }
          CNT_DEF=$(grep -Rsc --include='*.y*ml' '^ *isDefault: *true' . | awk -F: '{s+=$2} END{print s+0}')
          [ "$CNT_DEF" -eq 1 ] || { echo "Expected exactly one isDefault:true, found $CNT_DEF"; exit 1; }

      - name: Write grafana.env from secrets
        run: |
          set -e
          cd ~/apps/devops-qr
          cat > grafana.env <<'EOF'
          GF_SECURITY_ADMIN_USER=admin
          GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GF_SERVER_ROOT_URL=https://grafana.blainweb.com
          EOF
          chmod 600 grafana.env

      - name: Pull and restart stack on Pi (Docker services like Grafana)
        run: |
          set -e
          cd ~/apps/devops-qr
          if command -v docker-compose >/dev/null 2>&1; then
            docker-compose pull
            docker-compose up -d
          else
            docker compose pull
            docker compose up -d
          fi
          docker image prune -f || true

      - name: Restart Grafana to pick up provisioning
        run: docker restart grafana || true

      - name: Apply Velero metrics Service
        run: |
          set -e
          cd ~/apps/devops-qr
          kubectl get ns velero >/dev/null 2>&1 || kubectl create ns velero
          # Apply the Services from the correct path
          kubectl -n velero apply -f infra/velero/metrics-service.yaml

          # Quick sanity: list the services we just applied
          kubectl -n velero get svc velero-metrics velero-metrics-nodeport -o wide

          # (optional) Wait until Endpoints are populated
          for i in $(seq 1 15); do
            if kubectl -n velero get endpoints velero-metrics -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null | grep -q .; then
              echo "✅ velero-metrics endpoints are ready"
              break
            fi
            sleep 2
          done

      - name: Ensure Prometheus picked up prometheus.yml (reload + sanity)
        shell: bash
        run: |
          set -euo pipefail
          HOST_FILE=/home/blain/apps/devops-qr/monitoring/prometheus.yml

          echo "---- host prometheus.yml grep ----"
          # Accept optional quotes and any whitespace
          grep -En "job_name:[[:space:]]*['\"]?velero['\"]?" "$HOST_FILE" \
            || { echo "❌ velero job missing in host file"; exit 1; }
          grep -En "job_name:[[:space:]]*['\"]?cadvisor-k8s['\"]?" "$HOST_FILE" \
            || { echo "❌ cadvisor-k8s job missing in host file"; exit 1; }

          PROM=$(docker ps --format '{{.Names}}' | grep -i prometheus | head -n1)

          echo "→ Reload Prometheus config"
          docker exec "$PROM" wget -qO- --post-data="" http://localhost:9090/-/reload >/dev/null 2>&1 || true

          echo "---- container prometheus.yml grep ----"
          docker exec "$PROM" sh -lc "grep -En \"job_name:[[:space:]]*['\\\"]?velero['\\\"]?\" /etc/prometheus/prometheus.yml || echo '❌ velero job not found inside container'"
          docker exec "$PROM" sh -lc "grep -En \"job_name:[[:space:]]*['\\\"]?cadvisor-k8s['\\\"]?\" /etc/prometheus/prometheus.yml || echo '❌ cadvisor-k8s job not found inside container'"

          echo "---- active targets ----"
          docker exec "$PROM" wget -qO- 'http://localhost:9090/api/v1/targets' \
            | jq -r '.data.activeTargets[]
                    | select(.labels.job=="velero" or .labels.job=="cadvisor-k8s")
                    | "\(.labels.job)\t\(.health)\t\(.discoveredLabels.__address__)\t\(.lastError)"'

      - name: Wait for Grafana health
        run: |
          set -e
          NET=$(docker inspect grafana --format '{{range $k,$v := .NetworkSettings.Networks}}{{println $k}}{{end}}' | head -n1)
          for i in $(seq 1 20); do
            if docker run --rm --network "$NET" curlimages/curl:8.8.0 -sf http://grafana:3000/api/health > /dev/null; then
              echo "Grafana healthy"; exit 0
            fi
            sleep 2
          done
          echo "Grafana failed health check"
          docker logs --since=2m grafana || true
          exit 1

      - name: Ensure Grafana admin password
        run: docker exec grafana grafana-cli admin reset-admin-password '${{ secrets.GRAFANA_ADMIN_PASSWORD }}' || true

      - name: Verify Prometheus is scraping cadvisor-k8s
        shell: bash
        run: |
          set -euo pipefail
          PROM=$(docker ps --format '{{.Names}}' | grep -i prometheus | head -n1)

          echo "Active targets for cadvisor-k8s:"
          docker exec "$PROM" wget -qO- 'http://localhost:9090/api/v1/targets' \
            | jq -r '.data.activeTargets[] | select(.labels.job=="cadvisor-k8s") | "\(.health) -> \(.discoveredLabels.__address__)"'

          echo "up{job=\"cadvisor-k8s\"}:"
          docker exec "$PROM" wget -qO- \
            'http://localhost:9090/api/v1/query?query=up{job="cadvisor-k8s"}' \
            | jq -r '.data.result[]?.value'

      # -------- Velero (Backblaze B2) --------
      - name: Init Velero env defaults
        run: echo "SKIP_VELERO_SMOKE=0" >> "$GITHUB_ENV"

      - name: Ensure Velero namespace + credentials Secret
        shell: bash
        run: |
          set -euo pipefail
          cd ~/apps/devops-qr

          # Namespace (idempotent)
          kubectl get ns velero >/dev/null 2>&1 || kubectl create ns velero
          kubectl apply -f infra/velero/namespace.yaml

          # Credentials Secret (from GitHub Actions secrets)
          kubectl -n velero apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: velero-credentials
          type: Opaque
          stringData:
            cloud: |
              [default]
              aws_access_key_id = ${B2_KEY_ID}
              aws_secret_access_key = ${B2_APP_KEY}
          EOF

          # Quick sanity: both keys must be non-empty
          test -n "${B2_KEY_ID}" && test -n "${B2_APP_KEY}" || { echo "❌ Missing Backblaze secrets"; exit 1; }
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}

      - name: Install/upgrade Velero via HelmChart (fail-soft on B2 caps)
        shell: bash
        run: |
          set -euo pipefail
          cd ~/apps/devops-qr
          kubectl apply -f infra/velero/helmchart.yaml

          # Wait for the velero Deployment to appear
          echo "⏳ Waiting for velero Deployment to exist…"
          for i in {1..60}; do
            kubectl -n velero get deploy/velero >/dev/null 2>&1 && break || true
            sleep 2
          done
          if ! kubectl -n velero get deploy/velero >/dev/null 2>&1; then
            echo "❌ velero Deployment not created. Dumping Helm install job logs:"
            JOB=$(kubectl -n kube-system get job -l helmcharts.helm.cattle.io/chart=velero -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [[ -n "${JOB:-}" ]]; then
              POD=$(kubectl -n kube-system get pod -l job-name="${JOB}" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
              kubectl -n kube-system logs "${POD}" -c helm --tail=200 || true
            fi
            exit 1
          fi

          echo "⏳ Waiting for velero rollout…"
          # During a Helm upgrade the controller briefly deletes and recreates the
          # Deployment, which causes 'rollout status' to exit with "object has been
          # deleted". Retry a few times to ride out that window.
          ROLLED_OUT=false
          for attempt in {1..3}; do
            if kubectl -n velero rollout status deploy/velero --timeout=180s; then
              ROLLED_OUT=true
              break
            fi
            echo "⚠️  rollout status failed (attempt $attempt/3) — waiting for Deployment to stabilise..."
            sleep 15
            for i in {1..20}; do
              kubectl -n velero get deploy/velero >/dev/null 2>&1 && break || true
              sleep 3
            done
          done
          if [[ "$ROLLED_OUT" != "true" ]]; then
            echo "❌ velero rollout did not complete after 3 attempts"
            kubectl -n velero get pods -o wide || true
            kubectl -n velero describe deploy/velero || true
            exit 1
          fi
          kubectl -n velero get pods -o wide || true
          kubectl -n velero get ds/node-agent -o wide || true

          # Wait for BSL to become Available. If Backblaze caps are hit, pass the step and mark SKIP.
          echo "⏳ Waiting for BackupStorageLocation=Available…"
          for i in {1..90}; do
            PHASE=$(kubectl -n velero get backupstoragelocation default -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            MSG=$(kubectl -n velero get backupstoragelocation default -o jsonpath='{.status.message}' 2>/dev/null || echo "")
            echo "BSL phase: ${PHASE:-<none>} ${MSG:+| $MSG}"

            [[ "$PHASE" == "Available" ]] && break

            shopt -s nocasematch
            if [[ "$MSG" =~ transaction[[:space:]]+cap[[:space:]]+exceeded ]]; then
              echo "⚠️  Backblaze B2 transaction cap exceeded; continuing deploy and skipping smoke test."
              echo "SKIP_VELERO_SMOKE=1" >> "$GITHUB_ENV"
              exit 0
            fi
            shopt -u nocasematch
            sleep 2
          done

          PHASE=$(kubectl -n velero get backupstoragelocation default -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
          if [[ "$PHASE" != "Available" ]]; then
            echo "❌ BackupStorageLocation not Available. Details:"
            kubectl -n velero get backupstoragelocation -o wide || true
            kubectl -n velero describe backupstoragelocation default || true
            echo "Secret present?"
            kubectl -n velero get secret velero-credentials -o yaml || true
            exit 1
          fi

          echo "✅ Velero installed and BSL is Available."
          kubectl -n velero get backupstoragelocation -o wide

      - name: Apply Velero schedules
        shell: bash
        run: |
          set -euo pipefail
          cd ~/apps/devops-qr
          kubectl apply -f infra/velero/schedule-daily.yaml
          kubectl -n velero get schedules
          kubectl -n velero describe schedule | sed -n '1,120p'

      - name: Create an on-demand Velero backup (smoke test)
        if: env.SKIP_VELERO_SMOKE != '1'
        shell: bash
        run: |
          set -euo pipefail
          PHASE=$(kubectl -n velero get backupstoragelocation default -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
          if [[ -z "${PHASE}" || "${PHASE}" != "Available" ]]; then
            echo "⚠️  Skipping smoke backup because BSL is not Available (phase='${PHASE:-<none>}')."
            exit 0
          fi

          NOW=manual-$(date +%Y%m%d-%H%M)
          cat <<EOF | kubectl -n velero apply -f -
          apiVersion: velero.io/v1
          kind: Backup
          metadata:
            name: ${NOW}
            labels:
              smoke: "true"
          spec:
            storageLocation: default
            includedNamespaces:
            - "*"
            ttl: 336h0m0s
          EOF

          kubectl -n velero get backups

      - name: Wait for smoke backup to complete
        if: env.SKIP_VELERO_SMOKE != '1'
        shell: bash
        run: |
          set -euo pipefail
          NAME=$(kubectl -n velero get backups -l smoke=true --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || echo "")
          if [[ -z "${NAME}" ]]; then
            echo "ℹ️  No smoke backup found (probably skipped)."
            exit 0
          fi

          echo "Waiting on backup: $NAME"
          for i in {1..60}; do
            PHASE=$(kubectl -n velero get backup "$NAME" -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            echo "Phase: ${PHASE:-<none>}"
            if [[ "$PHASE" == "Completed" ]]; then
              kubectl -n velero describe backup "$NAME" | sed -n '1,160p'
              exit 0
            fi
            if [[ "$PHASE" == "PartiallyFailed" || "$PHASE" == "Failed" || "$PHASE" == "FailedValidation" ]]; then
              kubectl -n velero describe backup "$NAME" || true
              exit 1
            fi
            sleep 2
          done
          echo "Backup did not complete in time"
          kubectl -n velero describe backup "$NAME" || true
          exit 1
      # -------- end Velero --------

      # -------- NEW: wait for cert-manager, apply infra, wait for MetalLB, verify Traefik LB IP --------
      - name: Install cert-manager via HelmChart
        run: |
          set -e
          cd ~/apps/devops-qr
          kubectl apply -f infra/cert-manager/helmchart.yaml

          # Wait up to 5 min for the Helm controller to create the cert-manager deployments
          echo "Waiting for cert-manager deployments to appear..."
          for i in {1..60}; do
            CNT=$(kubectl -n cert-manager get deploy --no-headers 2>/dev/null | wc -l | xargs)
            if [[ "${CNT:-0}" -ge 3 ]]; then
              echo "Found $CNT cert-manager deployments."
              break
            fi
            sleep 5
          done

      - name: Wait for cert-manager to be Available
        run: |
          set -e
          kubectl -n cert-manager rollout status deploy/cert-manager --timeout=300s
          kubectl -n cert-manager rollout status deploy/cert-manager-webhook --timeout=300s
          kubectl -n cert-manager rollout status deploy/cert-manager-cainjector --timeout=300s

      - name: Install MetalLB via HelmChart
        run: |
          set -e
          cd ~/apps/devops-qr
          kubectl apply -f infra/metallb/helmchart.yaml

          # Wait for MetalLB CRDs to exist before we apply IPAddressPool / L2Advertisement
          echo "Waiting for MetalLB CRDs..."
          for i in {1..60}; do
            kubectl get crd ipaddresspools.metallb.io >/dev/null 2>&1 && \
            kubectl get crd l2advertisements.metallb.io >/dev/null 2>&1 && \
            echo "MetalLB CRDs ready." && break || true
            sleep 5
          done

          # Confirm CRDs actually appeared
          kubectl get crd ipaddresspools.metallb.io l2advertisements.metallb.io

          # Wait for the MetalLB controller (which runs the admission webhook) to be
          # ready. Without this, applying IPAddressPool / L2Advertisement fails with
          # "no endpoints available for service metallb-webhook-service".
          echo "Waiting for MetalLB controller rollout..."
          kubectl -n metallb-system rollout status deploy/metallb-controller --timeout=300s

      - name: Apply cluster infra (MetalLB, Traefik, ClusterIssuer)
        run: |
          set -e
          cd ~/apps/devops-qr
          kubectl apply -f infra/metallb/lan-pool.yaml
          kubectl apply -f infra/traefik/helmchartconfig.yaml
          kubectl apply -f infra/cert-manager/clusterissuer-letsencrypt.yaml

      - name: Wait for MetalLB to be Ready
        run: |
          set -e
          kubectl -n metallb-system wait --for=condition=ready pod -l app=metallb --timeout=120s || true
          kubectl -n metallb-system get pods -o wide

      - name: Verify Traefik has LB IP 192.168.1.220
        run: |
          set -e
          for i in $(seq 1 30); do
            IP=$(kubectl -n kube-system get svc traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || true)
            echo "EXTERNAL-IP: ${IP:-<none>}"
            [ "$IP" = "192.168.1.220" ] && exit 0
            sleep 2
          done
          echo "Traefik did not get 192.168.1.220 in time"
          kubectl -n kube-system get svc traefik -o wide
          kubectl -n metallb-system logs -l app=metallb,component=controller --tail=100 || true
          kubectl -n metallb-system logs -l app=metallb,speaker --tail=100 || true
          exit 1
      # -------- END NEW --------

      # -------- Install/upgrade cAdvisor DaemonSet --------
      - name: Install/upgrade cAdvisor DaemonSet (k3s/containerd)
        run: |
          set -e
          cd ~/apps/devops-qr
          kubectl apply -f monitoring/cadvisor-daemonset.yaml

      - name: Wait for cAdvisor & verify Service/metrics
        shell: bash
        run: |
          set -euo pipefail

          # 1) Wait until the DaemonSet is ready
          kubectl -n kube-system rollout status ds/cadvisor --timeout=180s

          echo "Service:"
          kubectl -n kube-system get svc cadvisor -o wide

          # 2) Pick one cAdvisor pod
          POD=$(kubectl -n kube-system get pod -l app=cadvisor -o jsonpath='{.items[0].metadata.name}')

          # 3) Port-forward and probe /metrics
          echo "Port-forward cadvisor pod and curl /metrics"
          kubectl -n kube-system port-forward "pod/${POD}" 18080:8080 --address 127.0.0.1 >/tmp/cadvisor-pf.log 2>&1 &
          PF_PID=$!
          cleanup() { kill "$PF_PID" 2>/dev/null || true; }
          trap cleanup EXIT

          # Wait up to ~10s for the PF to come up
          for i in {1..10}; do
            if curl -sf http://127.0.0.1:18080/metrics >/dev/null; then
              echo "✅ cAdvisor metrics reachable via port-forward"
              break
            fi
            sleep 1
          done

          # 4) Fetch once into a file (avoid pipefail+head issue)
          if ! curl -sf http://127.0.0.1:18080/metrics -o /tmp/cadvisor.metrics; then
            echo "❌ Could not reach cAdvisor via port-forward"
            echo "--- port-forward logs ---"
            tail -n +1 /tmp/cadvisor-pf.log || true
            kubectl -n kube-system get pods -l app=cadvisor -o wide || true
            kubectl -n kube-system logs "$POD" --tail=200 || true
            exit 1
          fi

          # Just *display* a preview
          head -n 10 /tmp/cadvisor.metrics || true

          # 5) Clean up PF explicitly (trap will also do it)
          cleanup
          trap - EXIT

      - name: Best-effort NodePort curl (doesn’t fail build)
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          IP=$(hostname -I | awk '{print $1}')
          for i in {1..15}; do
            if curl -sf "http://$IP:31090/metrics" >/dev/null; then
              echo "✅ NodePort reachable"
              # Show a preview line or two for logs:
              curl -sf "http://$IP:31090/metrics" | head -n 5 || true
              exit 0
            fi
            sleep 2
          done
          echo "⚠️ NodePort not reachable yet, continuing (Prometheus will retry)"

