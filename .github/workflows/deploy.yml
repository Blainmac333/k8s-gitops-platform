name: Build, Push, and Deploy to Pi

on:
  push:
    branches: [ master ]

concurrency:
  group: deploy-pi
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/qr-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/qr-backend:${{ github.sha }}

      - name: Build & push frontend (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: ./front-end-nextjs
          file: ./front-end-nextjs/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE=/api
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/qr-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/qr-frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Sync repo files on Pi
        run: |
          set -e
          cd ~/apps/devops-qr
          if [ -d .git ]; then
            git config --global --add safe.directory "$(pwd)" || true
            git fetch --all
            git reset --hard origin/master
          else
            echo "WARNING: ~/apps/devops-qr is not a git repo. Skipping sync."
          fi

      # --- keep provisioning dirs clean on every deploy ---
      - name: Remove untracked provisioning files
        run: |
          set -e
          cd ~/apps/devops-qr
          git clean -fd monitoring/grafana-provisioning/datasources
          git clean -fd monitoring/grafana-provisioning/dashboards

      - name: Guard Grafana datasource provisioning
        run: |
          set -e
          cd ~/apps/devops-qr/monitoring/grafana-provisioning/datasources
          echo "Files:"; ls -1
          CNT_FILES=$(ls -1 *.y*ml 2>/dev/null | wc -l | xargs)
          [ "$CNT_FILES" -eq 1 ] || { echo "Expected exactly one datasource YAML, found $CNT_FILES"; exit 1; }
          CNT_DEF=$(grep -Rsc --include='*.y*ml' '^ *isDefault: *true' . | awk -F: '{s+=$2} END{print s+0}')
          [ "$CNT_DEF" -eq 1 ] || { echo "Expected exactly one isDefault:true, found $CNT_DEF"; exit 1; }

      - name: Write grafana.env from secrets
        run: |
          set -e
          cd ~/apps/devops-qr
          cat > grafana.env <<'EOF'
          GF_SECURITY_ADMIN_USER=admin
          GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GF_SERVER_ROOT_URL=https://grafana.blainweb.com
          EOF
          chmod 600 grafana.env

      - name: Pull and restart stack on Pi (Docker services like Grafana)
        run: |
          set -e
          cd ~/apps/devops-qr
          if [ -n "${{ secrets.GHCR_PAT }}" ]; then
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
          fi
          if command -v docker-compose >/dev/null 2>&1; then
            docker-compose pull
            docker-compose up -d
          else
            docker compose pull
            docker compose up -d
          fi
          docker image prune -f || true

      - name: Restart Grafana to pick up provisioning
        run: docker restart grafana || true

      - name: Wait for Grafana health
        run: |
          set -e
          NET=$(docker inspect grafana --format '{{range $k,$v := .NetworkSettings.Networks}}{{println $k}}{{end}}' | head -n1)
          for i in $(seq 1 20); do
            if docker run --rm --network "$NET" curlimages/curl:8.8.0 -sf http://grafana:3000/api/health > /dev/null; then
              echo "Grafana healthy"; exit 0
            fi
            sleep 2
          done
          echo "Grafana failed health check"
          docker logs --since=2m grafana || true
          exit 1

      - name: Ensure Grafana admin password
        run: docker exec grafana grafana-cli admin reset-admin-password '${{ secrets.GRAFANA_ADMIN_PASSWORD }}' || true

              # -------- Velero (Backblaze B2) --------
      - name: Ensure Velero namespace + credentials Secret
        run: |
          set -e
          kubectl apply -f infra/velero/namespace.yaml

          # Create/patch secret with S3-compatible credentials in Velero's expected format
          kubectl -n velero apply -f - <<'EOF'
          apiVersion: v1
          kind: Secret
          metadata:
            name: velero-credentials
          type: Opaque
          stringData:
            cloud: |
              [default]
              aws_access_key_id = ${B2_KEY_ID}
              aws_secret_access_key = ${B2_APP_KEY}
          EOF
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}

      - name: Install/upgrade Velero via HelmChart (k3s Helm controller)
        run: |
          set -e
          kubectl apply -f infra/velero/helmchart.yaml
          # wait for the velero deployment to be created, then ready
          for i in $(seq 1 30); do
            kubectl -n velero get deploy/velero >/dev/null 2>&1 && break
            sleep 2
          done
          kubectl -n velero rollout status deploy/velero --timeout=180s || (kubectl -n velero get pods; exit 1)

      - name: Apply Velero backup schedule
        run: |
          set -e
          kubectl apply -f infra/velero/schedule-daily.yaml
      # -------- end Velero --------

      # -------- NEW: wait for cert-manager, apply infra, wait for MetalLB, verify Traefik LB IP --------
      - name: Wait for cert-manager to be Available
        run: |
          set -e
          kubectl -n cert-manager rollout status deploy/cert-manager --timeout=120s
          kubectl -n cert-manager rollout status deploy/cert-manager-webhook --timeout=120s
          kubectl -n cert-manager rollout status deploy/cert-manager-cainjector --timeout=120s

      - name: Apply cluster infra (MetalLB, Traefik, ClusterIssuer)
        run: |
          set -e
          cd ~/apps/devops-qr
          # You can keep the explicit files OR use the recursive apply below.
          kubectl apply -f infra/metallb/lan-pool.yaml
          kubectl apply -f infra/traefik/helmchartconfig.yaml
          kubectl apply -f infra/cert-manager/clusterissuer-letsencrypt.yaml
          # Recommended alternative for future additions:
          # kubectl apply -R -f infra/

      - name: Wait for MetalLB to be Ready
        run: |
          set -e
          kubectl -n metallb-system wait --for=condition=ready pod -l app=metallb --timeout=120s || true
          kubectl -n metallb-system get pods -o wide

      - name: Verify Traefik has LB IP 192.168.1.220
        run: |
          set -e
          for i in $(seq 1 30); do
            IP=$(kubectl -n kube-system get svc traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || true)
            echo "EXTERNAL-IP: ${IP:-<none>}"
            [ "$IP" = "192.168.1.220" ] && exit 0
            sleep 2
          done
          echo "Traefik did not get 192.168.1.220 in time"
          kubectl -n kube-system get svc traefik -o wide
          kubectl -n metallb-system logs -l app=metallb,component=controller --tail=100 || true
          kubectl -n metallb-system logs -l app=metallb,speaker --tail=100 || true
          exit 1
      # -------- END NEW --------

      # ---------- k3s: apply manifests & pin images to this commit ----------
      - name: Apply k8s manifests
        run: |
          set -e
          cd ~/apps/devops-qr
          kubectl apply -R -f k8s/

      - name: Point Deployments at exact images for this commit
        run: |
          set -e
          kubectl -n qr set image deploy/qr-backend  qr-backend=ghcr.io/blainmac333/qr-backend:${{ github.sha }}
          kubectl -n qr set image deploy/qr-frontend qr-frontend=ghcr.io/blainmac333/qr-frontend:${{ github.sha }}

      - name: Wait for k8s rollouts
        run: |
          set -e
          kubectl -n qr rollout status deploy/qr-backend
          kubectl -n qr rollout status deploy/qr-frontend

      # ---------- Caddy: reload + end-to-end smoke test ----------
      - name: Reload Caddy config
        run: |
          set -e
          docker exec qr-proxy caddy reload --config /etc/caddy/Caddyfile
          # give Caddy a moment to finish listeners / caches
          sleep 2

      - name: End-to-end QR API smoke test (Caddy -> Traefik -> k3s)
        shell: bash
        run: |
          set -euo pipefail

          retry() {
            local max="${1:-10}"; shift
            local n=0
            until "$@"; do
              n=$((n+1))
              if [[ "$n" -ge "$max" ]]; then
                echo "ERROR: command failed after $n attempts: $*"
                return 1
              fi
              sleep 2
            done
          }

          echo "1) Wait for health (Caddy -> NodePort -> Traefik -> backend)"
          retry 30 curl -sf -H 'Host: qr.blainweb.com' http://localhost/api/health

          echo "2) Generate QR with retries"
          JSON=""
          gen() {
            JSON=$(curl -sS -H 'Host: qr.blainweb.com' -H 'content-type: application/json' \
                  --data '{"text":"https://www.youtube.com/"}' \
                  http://localhost/api/generate-qr || true)
            echo "JSON: $JSON"
            local URL
            URL=$(printf '%s' "$JSON" | sed -n 's/.*"qr_code_url":"\([^"]*\)".*/\1/p')
            [[ -n "${URL:-}" && "$URL" != "null" ]]
          }
          retry 10 gen

          URL=$(printf '%s' "$JSON" | sed -n 's/.*"qr_code_url":"\([^"]*\)".*/\1/p')
          echo "QR URL: $URL"

          echo "3) Fetch PNG with retries"
          fetch_ok() {
            CODE=$(curl -sS -o /dev/null -w '%{http_code}' -H 'Host: qr.blainweb.com' "$URL" || echo 000)
            echo "PNG status: $CODE"
            [[ "$CODE" == "200" ]]
          }
          if ! retry 10 fetch_ok; then
            echo "--- Diagnostics (last 2m) ---"
            docker logs --since=2m qr-proxy || true
            kubectl -n kube-system get pods -l app.kubernetes.io/name=traefik -o wide || true
            kubectl -n qr get pods -o wide || true
            exit 1
          fi

          echo "Smoke test passed ✅"