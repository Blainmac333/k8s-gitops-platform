name: Build, Push, and Deploy to Pi

on:
  push:
    branches: [ master ]

concurrency:
  group: deploy-pi
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/qr-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/qr-backend:${{ github.sha }}

      - name: Build & push frontend (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: ./front-end-nextjs
          file: ./front-end-nextjs/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE=/api
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/qr-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/qr-frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Sync repo files on Pi
        run: |
          set -e
          cd ~/apps/devops-qr
          if [ -d .git ]; then
            git config --global --add safe.directory "$(pwd)" || true
            git fetch --all
            git reset --hard origin/master
          else
            echo "WARNING: ~/apps/devops-qr is not a git repo. Skipping sync."
          fi

      - name: Write grafana.env from secrets
        run: |
          set -e
          cd ~/apps/devops-qr
          cat > grafana.env <<'EOF'
          GF_SECURITY_ADMIN_USER=admin
          GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GF_SERVER_ROOT_URL=https://grafana.blainweb.com
          EOF
          chmod 600 grafana.env

      - name: Pull and restart stack on Pi
        run: |
          set -e
          cd ~/apps/devops-qr
          if [ -n "${{ secrets.GHCR_PAT }}" ]; then
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
          fi
          if command -v docker-compose >/dev/null 2>&1; then
            docker-compose pull
            docker-compose up -d
          else
            docker compose pull
            docker compose up -d
          fi
          docker image prune -f || true

      # Force Grafana to reload provisioning (dashboards & datasources)
      - name: Restart Grafana to pick up provisioning
        run: |
          docker restart grafana || true

      # Optional: ensure admin password matches the secret
      - name: Ensure Grafana admin password
        run: |
          docker exec grafana grafana-cli admin reset-admin-password '${{ secrets.GRAFANA_ADMIN_PASSWORD }}' || true

      # Optional: quick log peek so provisioning issues are visible in CI
      - name: Check Grafana provisioning logs (non-blocking)
        run: |
          sleep 3
          docker logs --since=30s grafana | sed -n '/provision/Ip' || true

      # Optional: reload Caddy to pick up any Caddyfile changes
      - name: Reload Caddy config
        run: |
          docker exec qr-proxy caddy reload --config /etc/caddy/Caddyfile || true