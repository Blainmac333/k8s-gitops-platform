services:
  proxy:
    image: caddy:2
    container_name: qr-proxy
    ports:
      - "80:80"     # later you can switch to "127.0.0.1:80:80" after the tunnel works
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/blainmac333/qr-backend:latest
    container_name: qr-backend
    env_file:
      - ./api.env
    volumes:
      - ./data/qrs:/data/qrs
    restart: unless-stopped

  frontend:
    image: ghcr.io/blainmac333/qr-frontend:latest
    container_name: qr-frontend
    depends_on:
      - backend
    restart: unless-stopped
